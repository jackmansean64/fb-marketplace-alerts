# ============================================================
# Facebook Marketplace Alerts — Configuration
# ============================================================
# Copy this file to config.yaml and edit it to match your needs.
#
# Location slugs are the city/region names that appear in the
# Facebook Marketplace URL, e.g.:
#   https://www.facebook.com/marketplace/victoria/search?...
#                                       ^^^^^^^^
# Common examples: victoria, vancouver, toronto, calgary,
#                  edmonton, ottawa, montreal
# You can also use a numeric Facebook location ID.
# ============================================================

# --- Email settings ---
email:
  sender_email: "jackmansean64@gmail.com"
  receiver_email: "jackmansean64@gmail.com"

# --- Alert frequency (hourly | daily | weekly | monthly) ---
# Controls how often the app scrapes and sends alert emails
# when running in background mode (the default).
alert_frequency: daily

# --- Searches ---
# You can define as many searches as you like. Each one will
# be run independently and the results combined into a single
# alert email.
searches:
  - query: "Prius V"

    # ----------------------------------------------------------
    # Search filters — applied directly in the Marketplace query
    # ----------------------------------------------------------
    location: "victoria"
    days_since_listed: 30
    # min_price: 1000
    # max_price: 25000
    vehicle_filters:
      max_mileage: 150000
      # min_year: 2012
      # max_year: 2025

    # ----------------------------------------------------------
    # Post-processing filters — applied by the app after results
    # are retrieved from Marketplace
    # ----------------------------------------------------------
    allowed_locations:
      - "victoria"
      - "sooke"
      - "saanich"
      - "sidney"
      - "langford"
      - "esquimalt"
      - "oak bay"
      - "central saanich"
      - "duncan"
      - "colwood"
      - "view royal"
      - "north cowichan"
      - "cowichan valley"
      - "metchosin"
      - "nanaimo"
      - "nanaimo district"
      - "parksville"
      - "lantzville"
      - "qualicum beach"
      - "ladysmith"
      - "port alberni"
      - "courtenay"
      - "comox"
      - "comox valley"
      - "cumberland"
      - "campbell river"
    required_in_title:        # only keep listings whose title contains one of these (case-insensitive)
      - "Prius V"
    max_listings: 100

  # --- Example: add a second search ---
